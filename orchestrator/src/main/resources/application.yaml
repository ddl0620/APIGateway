spring:
  application:
    name: orchestrator
  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 1MB

server:
  port: 8080
  tomcat:
    max-http-form-post-size: 1MB
    max-swallow-size: 1MB

services:
  user:
    base-url: ${SERVICES_USER_BASE_URL:http://localhost:8081}
  payment:
    base-url: ${SERVICES_PAYMENT_BASE_URL:http://localhost:8082}
  internal-api-key: ${INTERNAL_API_KEY}

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
