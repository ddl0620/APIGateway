# Helm values for APISIX
# Install: helm repo add apisix https://charts.apiseven.com
#          helm install apisix apisix/apisix -n office-mb -f values.yaml

apisix:
  kind: Deployment
  replicaCount: 2

  # Enable the Admin API for route management
  admin:
    enabled: true
    type: ClusterIP
    port: 9180
    credentials:
      admin: "admin-key-change-in-prod"

  # Expose APISIX gateway via NodePort for local testing
  gateway:
    type: NodePort
    http:
      enabled: true
      nodePort: 30080

  # Enable service discovery from K8s
  discovery:
    enabled: true
    type: kubernetes

etcd:
  enabled: true
  replicaCount: 1
