apiVersion: v1
kind: ConfigMap
metadata:
  name: krakend-config
  namespace: office-mb
data:
  krakend.json: |
    # Mounted from krakend.json — see k8s/gateway/krakend/krakend.json
    # In practice, use: kubectl create configmap krakend-config --from-file=krakend.json -n office-mb
  jwk.json: |
    # Mounted from jwk.json — see k8s/gateway/krakend/jwk.json
    # In practice, use: kubectl create configmap krakend-config --from-file=krakend.json --from-file=jwk.json -n office-mb
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: krakend
  namespace: office-mb
  labels:
    app: krakend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: krakend
  template:
    metadata:
      labels:
        app: krakend
    spec:
      containers:
        - name: krakend
          image: devopsfaith/krakend:2.7
          ports:
            - containerPort: 8888
          command: ["/usr/bin/krakend"]
          args: ["run", "-c", "/etc/krakend/krakend.json", "-d"]
          volumeMounts:
            - name: config
              mountPath: /etc/krakend
          readinessProbe:
            httpGet:
              path: /__health
              port: 8888
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /__health
              port: 8888
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: krakend-config
---
apiVersion: v1
kind: Service
metadata:
  name: krakend
  namespace: office-mb
  labels:
    app: krakend
spec:
  type: NodePort
  selector:
    app: krakend
  ports:
    - port: 8888
      targetPort: 8888
      nodePort: 30088
      protocol: TCP
