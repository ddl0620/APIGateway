apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: office-mb
  labels:
    app: orchestrator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
        - name: orchestrator
          image: orchestrator:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: JWT_SECRET
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: INTERNAL_API_KEY
            # In K8s, services communicate via internal DNS
            - name: SERVICES_USER_BASE_URL
              value: "http://user-service.office-mb.svc.cluster.local"
            - name: SERVICES_PAYMENT_BASE_URL
              value: "http://payment-service.office-mb.svc.cluster.local"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: office-mb
  labels:
    app: orchestrator
spec:
  type: ClusterIP          # Only gateway accesses this
  selector:
    app: orchestrator
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
