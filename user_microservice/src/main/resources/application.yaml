spring:
  application:
    name: user_microservice
  autoconfigure:
    exclude: org.springframework.boot.mongodb.autoconfigure.health.MongoHealthContributorAutoConfiguration
  mongodb:
    uri: ${MONGODB_URI}&serverMonitoringMode=POLL
  servlet:
    multipart:
      max-file-size: 1MB
      max-request-size: 1MB

server:
  port: 8081
  tomcat:
    max-http-form-post-size: 1MB
    max-swallow-size: 1MB

jwt:
  secret: ${JWT_SECRET}
  access-token-expiration: 900000
  refresh-token-expiration: 604800000

internal:
  api-key: ${INTERNAL_API_KEY}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when-authorized
